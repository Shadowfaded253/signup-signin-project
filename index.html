<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="main-container">

    <form id="signupForm" class="form-box">
        <h2>Create Account</h2>

        <input type="text" id="fullname" placeholder="Full Name">
        <small class="error" id="nameError"></small>

        <input type="email" id="email" placeholder="Email">
        <small class="error" id="emailError"></small>

        <input type="text" id="phone" placeholder="Phone Number">
        <small class="error" id="phoneError"></small>

        <input type="text" id="city" placeholder="Location / City">
        <small class="error" id="cityError"></small>

        <div class="password-box">
            <input type="password" id="password" placeholder="Password">
            <button type="button" onclick="togglePassword('password')">Show</button>
        </div>
        <small class="error" id="passwordError"></small>

        <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <button type="button" onclick="togglePassword('confirmPassword')">Show</button>
        </div>
        <small class="error" id="confirmError"></small>

        <button type="submit" class="btn btn-primary w-100">Sign Up</button>

        <p class="mt-3">
            Already have an account?
            <a href="SignIn.html">Sign In</a>
        </p>

    </form>

</div>

<script src="js/index.js"></script>

</body>
</html>
